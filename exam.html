<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mac & iPad — Τελική Αξιολόγηση</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0a0a0a;
  color: #fff;
  min-height: 100vh;
}

/* INTRO */
#intro {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 24px;
  text-align: center;
  background: radial-gradient(ellipse at 50% 0%, rgba(255,214,10,0.07) 0%, transparent 60%);
}
#intro h1 {
  font-size: clamp(28px, 5vw, 46px);
  font-weight: 800;
  letter-spacing: -1.5px;
  line-height: 1.1;
  margin-bottom: 12px;
}
#intro h1 span { color: #ffd60a; }
#intro p { font-size: 16px; color: rgba(255,255,255,0.5); max-width: 480px; margin-bottom: 36px; line-height: 1.6; }
.stats { display: flex; gap: 28px; justify-content: center; margin-bottom: 36px; flex-wrap: wrap; }
.stat-val { font-size: 30px; font-weight: 800; color: #fff; }
.stat-lbl { font-size: 11px; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
.pills { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-bottom: 40px; }
.pill {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 12px;
  color: rgba(255,255,255,0.5);
  display: flex; align-items: center; gap: 6px;
}
.pill .dot { width: 7px; height: 7px; border-radius: 50%; }
.d-blue { background: #0a84ff; }
.d-gold { background: #ffd60a; }
.d-purple { background: #bf5af2; }
#startBtn {
  background: #ffd60a;
  color: #0a0a0a;
  border: none;
  padding: 16px 52px;
  border-radius: 14px;
  font-size: 17px;
  font-weight: 800;
  cursor: pointer;
  letter-spacing: -0.3px;
  touch-action: manipulation;
}
#startBtn:active { opacity: 0.85; }

/* QUIZ */
#quiz { display: none; min-height: 100vh; flex-direction: column; }
#quiz.on { display: flex; }

.qbar {
  position: sticky; top: 0; z-index: 10;
  background: rgba(10,10,10,0.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(255,255,255,0.07);
  padding: 12px 20px;
  display: flex; align-items: center; gap: 14px;
}
.qbar-counter { font-size: 13px; font-weight: 700; color: #ffd60a; white-space: nowrap; }
.qbar-prog { flex: 1; background: rgba(255,255,255,0.1); border-radius: 3px; height: 4px; }
.qbar-fill { height: 4px; border-radius: 3px; background: #ffd60a; transition: width 0.4s; }
.qbar-badge {
  font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 6px;
  white-space: nowrap; text-transform: uppercase; letter-spacing: 0.5px;
}
.b-basic  { background: rgba(10,132,255,0.2);  color: #0a84ff; }
.b-advanced { background: rgba(255,214,10,0.15);  color: #ffd60a; }
.b-expert { background: rgba(191,90,242,0.15); color: #bf5af2; }
.qbar-timer {
  font-size: 14px; font-weight: 800; padding: 4px 10px;
  border-radius: 8px; background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  min-width: 56px; text-align: center;
}
.qbar-timer.warn { color: #ff9f0a; }
.qbar-timer.danger { color: #ff453a; background: rgba(255,69,58,0.1); }

.qbody {
  flex: 1;
  padding: 28px 20px 48px;
  max-width: 680px;
  margin: 0 auto;
  width: 100%;
}
.qcat { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.3); margin-bottom: 10px; }
.qtext { font-size: 19px; font-weight: 700; line-height: 1.35; letter-spacing: -0.3px; margin-bottom: 24px; }
.qopts { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
.qopt {
  all: unset;
  box-sizing: border-box;
  width: 100%;
  padding: 14px 18px;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.08);
  background: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.7);
  font-size: 14px;
  line-height: 1.45;
  cursor: pointer;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  touch-action: manipulation;
  transition: border-color 0.15s, background 0.15s;
}
.qopt:hover { border-color: rgba(255,214,10,0.4); background: rgba(255,214,10,0.07); color: #fff; }
.qopt.correct { border-color: #30d158; background: rgba(48,209,88,0.1); color: #6eda8a; font-weight: 600; pointer-events: none; }
.qopt.wrong   { border-color: #ff453a; background: rgba(255,69,58,0.08); color: #ff6b6b; pointer-events: none; }
.qopt.reveal  { border-color: rgba(48,209,88,0.25); pointer-events: none; }
.qopt.off     { pointer-events: none; opacity: 0.45; }
.oletter {
  width: 22px; height: 22px; border-radius: 6px; flex-shrink: 0;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.4);
}
.qopt.correct .oletter { background: #30d158; border-color: #30d158; color: #000; }
.qopt.wrong   .oletter { background: #ff453a; border-color: #ff453a; color: #fff; }

.qfeedback {
  display: none; margin-bottom: 16px;
  font-size: 13px; padding: 10px 14px; border-radius: 9px; line-height: 1.5;
}
.qfeedback.on { display: block; }
.qfeedback.c { background: rgba(48,209,88,0.1); color: #6eda8a; }
.qfeedback.w { background: rgba(255,69,58,0.08); color: #ff6b6b; }

#nextBtn {
  all: unset;
  box-sizing: border-box;
  display: none;
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  background: #fff;
  color: #000;
  font-size: 15px;
  font-weight: 700;
  text-align: center;
  cursor: pointer;
  touch-action: manipulation;
}
#nextBtn.on { display: block; }
#nextBtn:active { opacity: 0.8; }

/* RESULTS */
#results {
  display: none;
  min-height: 100vh;
  flex-direction: column;
  align-items: center;
  padding: 48px 24px 80px;
  overflow-y: auto;
}
#results.on { display: flex; }
.results-inner { max-width: 640px; width: 100%; }
.res-hero { text-align: center; margin-bottom: 40px; }
.res-emoji { font-size: 56px; margin-bottom: 12px; }
.res-title { font-size: 28px; font-weight: 800; letter-spacing: -0.8px; margin-bottom: 8px; }
.res-sub { font-size: 16px; color: rgba(255,255,255,0.45); margin-bottom: 20px; }
.res-ring {
  width: 130px; height: 130px; border-radius: 50%; margin: 0 auto 14px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  border: 3px solid #ffd60a; background: rgba(255,214,10,0.08);
}
.res-pct { font-size: 38px; font-weight: 800; color: #ffd60a; letter-spacing: -2px; line-height: 1; }
.res-raw { font-size: 13px; color: rgba(255,255,255,0.35); margin-bottom: 4px; }

.breakdown { margin-bottom: 28px; }
.bd-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.3); margin-bottom: 12px; }
.bd-item { background: rgba(255,255,255,0.04); border-radius: 12px; padding: 14px 18px; margin-bottom: 8px; display: flex; align-items: center; gap: 14px; border: 1px solid rgba(255,255,255,0.07); }
.bd-icon { font-size: 20px; }
.bd-lbl { font-size: 14px; font-weight: 600; flex: 1; }
.bd-bar-wrap { flex: 2; }
.bd-bg { background: rgba(255,255,255,0.08); border-radius: 4px; height: 6px; }
.bd-fill { height: 6px; border-radius: 4px; transition: width 1s ease; }
.bd-score { font-size: 13px; font-weight: 700; min-width: 44px; text-align: right; }

.review { margin-bottom: 28px; }
.rev-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(255,255,255,0.3); margin-bottom: 12px; }
.rev-item { background: rgba(255,255,255,0.04); border-radius: 12px; padding: 14px 16px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.07); border-left: 3px solid #ff453a; }
.rev-item.ok { border-left-color: #30d158; }
.rev-q { font-size: 13px; font-weight: 600; margin-bottom: 6px; line-height: 1.4; }
.rev-ans { font-size: 12px; color: rgba(255,255,255,0.4); line-height: 1.5; }
.rev-ans .ca { color: #6eda8a; }
.rev-ans .wa { color: #ff6b6b; }

.res-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-top: 8px; }
#retryBtn {
  background: #ffd60a; color: #000; border: none;
  padding: 13px 32px; border-radius: 12px; font-size: 15px; font-weight: 800;
  cursor: pointer; touch-action: manipulation;
}
#retryBtn:active { opacity: 0.8; }
#homeLink {
  background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.7);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 13px 32px; border-radius: 12px; font-size: 15px; font-weight: 600;
  text-decoration: none; display: inline-block;
}

@media (max-width: 600px) {
  .qtext { font-size: 16px; }
  .qopt { font-size: 13px; padding: 12px 14px; }
  .bd-item { flex-wrap: wrap; }
  .bd-bar-wrap { flex: 1 1 100%; }
}
</style>
</head>
<body>

<!-- INTRO -->
<div id="intro">
  <div class="pills">
    <div class="pill"><span class="dot d-blue"></span>10 Basic</div>
    <div class="pill"><span class="dot d-gold"></span>10 Advanced</div>
    <div class="pill"><span class="dot d-purple"></span>10 Expert</div>
  </div>
  <h1>Mac & iPad<br><span>Τελική Αξιολόγηση</span></h1>
  <p>30 ερωτήσεις από και τα 3 επίπεδα εκπαίδευσης — προϊόντα, chips, σενάρια και τεχνικές πωλήσεων.</p>
  <div class="stats">
    <div><div class="stat-val">30</div><div class="stat-lbl">Ερωτήσεις</div></div>
    <div><div class="stat-val">25'</div><div class="stat-lbl">Χρόνος</div></div>
    <div><div class="stat-val">70%</div><div class="stat-lbl">Για πέρασμα</div></div>
  </div>
  <button id="startBtn" onclick="startExam()">Έναρξη →</button>
</div>

<!-- QUIZ -->
<div id="quiz">
  <div class="qbar">
    <span class="qbar-counter" id="qCounter">1 / 30</span>
    <div class="qbar-prog"><div class="qbar-fill" id="qProg" style="width:0%"></div></div>
    <span class="qbar-badge b-basic" id="qBadge">Basic</span>
    <span class="qbar-timer" id="qTimer">25:00</span>
  </div>
  <div class="qbody">
    <div class="qcat" id="qCat"></div>
    <div class="qtext" id="qText"></div>
    <div class="qopts" id="qOpts"></div>
    <div class="qfeedback" id="qFb"></div>
    <button id="nextBtn" onclick="nextQ()">Επόμενη →</button>
  </div>
</div>

<!-- RESULTS -->
<div id="results">
  <div class="results-inner">
    <div class="res-hero">
      <div class="res-emoji" id="rEmoji"></div>
      <div class="res-title" id="rTitle"></div>
      <div class="res-sub" id="rSub"></div>
      <div class="res-ring">
        <div class="res-pct" id="rPct"></div>
        <div style="font-size:11px;color:rgba(255,255,255,0.3);margin-top:2px;">Σκορ</div>
      </div>
      <div class="res-raw" id="rRaw"></div>
    </div>
    <div class="breakdown">
      <div class="bd-title">Αποτέλεσμα ανά επίπεδο</div>
      <div class="bd-item">
        <div class="bd-icon">📚</div>
        <div class="bd-lbl">Basic</div>
        <div class="bd-bar-wrap"><div class="bd-bg"><div class="bd-fill" id="barBasic" style="width:0%;background:#0a84ff"></div></div></div>
        <div class="bd-score" id="scBasic" style="color:#0a84ff">—</div>
      </div>
      <div class="bd-item">
        <div class="bd-icon">⚡</div>
        <div class="bd-lbl">Advanced</div>
        <div class="bd-bar-wrap"><div class="bd-bg"><div class="bd-fill" id="barAdv" style="width:0%;background:#ffd60a"></div></div></div>
        <div class="bd-score" id="scAdv" style="color:#ffd60a">—</div>
      </div>
      <div class="bd-item">
        <div class="bd-icon">💎</div>
        <div class="bd-lbl">Expert</div>
        <div class="bd-bar-wrap"><div class="bd-bg"><div class="bd-fill" id="barExp" style="width:0%;background:#bf5af2"></div></div></div>
        <div class="bd-score" id="scExp" style="color:#bf5af2">—</div>
      </div>
    </div>
    <div class="review">
      <div class="rev-title">Επισκόπηση</div>
      <div id="revList"></div>
    </div>
    <div class="res-actions">
      <button id="retryBtn" onclick="retryExam()">🔄 Ξανά</button>
      <a id="homeLink" href="index.html">← Αρχική</a>
    </div>
  </div>
</div>

<script>
var QUESTIONS = [
  // BASIC
  {level:"basic",cat:"Γκάμα Mac",
   q:"Ποιο Mac είναι εντελώς αθόρυβο λόγω fanless design;",
   opts:["MacBook Pro 14\" M5","Mac mini M4","MacBook Air M5","iMac M4"],
   correct:2,
   ex:"Τα MacBook Air (13\" & 15\") είναι fanless. Ποτέ δεν ακούγεται ανεμιστήρας."},
  {level:"basic",cat:"Γκάμα iPad",
   q:"Ποιο iPad ΔΕΝ υποστηρίζει Apple Pencil Pro;",
   opts:["iPad Air M4","iPad Pro M5","iPad mini 7η γενιά","iPad 11η γενιά (A16)"],
   correct:3,
   ex:"Το iPad A16 υποστηρίζει Pencil USB-C και Pencil 1st gen. Δεν υποστηρίζει Pencil Pro."},
  {level:"basic",cat:"Αξεσουάρ",
   q:"Ένας πελάτης αγοράζει iPad Air M4. Ποιο keyboard του προτείνεις;",
   opts:["Magic Keyboard for iPad Pro","Magic Keyboard Folio","Smart Keyboard","Magic Keyboard for iPad Air"],
   correct:3,
   ex:"Το Magic Keyboard for iPad Air είναι σχεδιασμένο ειδικά για iPad Air M4."},
  {level:"basic",cat:"Σενάρια",
   q:"Γονέας θέλει απλό all-in-one για σπίτι. Τι προτείνεις;",
   opts:["MacBook Pro 14\"","Mac Studio M4 Max","iMac M4","MacBook Air 15\""],
   correct:2,
   ex:"iMac M4: 24\" 4.5K, all-in-one, 7 χρώματα, περιλαμβάνει keyboard και mouse."},
  {level:"basic",cat:"Τεχνικές",
   q:"Πελάτης λέει «Θα το σκεφτώ». Τι κάνεις;",
   opts:["Τον αφήνεις να φύγει","Προσφέρεις έκπτωση","Ρωτάς τι ακριβώς τον κρατάει","Του λες ότι το stock τελειώνει"],
   correct:2,
   ex:"Το «Θα το σκεφτώ» κρύβει συγκεκριμένη αντίρρηση. Βρες τη και αντιμετώπισέ την."},
  {level:"basic",cat:"Γκάμα Mac",
   q:"Τι chip έχει το MacBook Neo;",
   opts:["M5","A16 Bionic","M4","A18 Pro"],
   correct:3,
   ex:"Το MacBook Neo τρέχει A18 Pro — chip της σειράς iPhone 16 Pro."},
  {level:"basic",cat:"Setup",
   q:"Ποιος είναι ο καλύτερος τρόπος μεταφοράς δεδομένων από παλιό Mac σε νέο;",
   opts:["USB stick χειροκίνητα","AirDrop αρχείο-αρχείο","Migration Assistant","iCloud backup"],
   correct:2,
   ex:"Migration Assistant μεταφέρει apps, αρχεία, ρυθμίσεις σε ένα βήμα."},
  {level:"basic",cat:"Continuity",
   q:"Τι κάνει το Sidecar;",
   opts:["Μεταφέρει αρχεία","iPad ως δεύτερη οθόνη Mac ασύρματα","Συγχρονίζει επαφές","Ελέγχει iPhone από Mac"],
   correct:1,
   ex:"Sidecar: iPad ως second screen για Mac ασύρματα, με Apple Pencil support."},
  {level:"basic",cat:"Γκάμα iPad",
   q:"Ποιο iPad έχει Tandem OLED και Face ID;",
   opts:["iPad Air M4","iPad mini 7η γενιά","iPad 11η γενιά","iPad Pro M5"],
   correct:3,
   ex:"Μόνο το iPad Pro M5 έχει Tandem OLED (Ultra Retina XDR) και Face ID."},
  {level:"basic",cat:"Τεχνικές",
   q:"Γιατί να προτείνεις upgrade RAM τώρα και όχι αργότερα;",
   opts:["Κοστίζει λιγότερο τώρα","Η RAM είναι μέσα στο chip και δεν αναβαθμίζεται αργότερα","Η βασική RAM είναι αργή","Βελτιώνει τη μπαταρία"],
   correct:1,
   ex:"Unified Memory είναι ενσωματωμένη στο chip. Μόλις αγοραστεί, δεν αλλάζει."},

  // ADVANCED
  {level:"advanced",cat:"Chip Architecture",
   q:"Ποια είναι η κυριότερη διαφορά M5 vs M5 Pro σε sustained workloads;",
   opts:["Ο M5 Pro έχει καλύτερη μπαταρία","Ο M5 Pro έχει διπλάσιο memory bandwidth (307 vs 153 GB/s) — διατηρεί σταθερή απόδοση υπό φόρτο","Ο M5 Pro υποστηρίζει περισσότερες εξωτερικές οθόνες","Ο M5 Pro είναι fanless"],
   correct:1,
   ex:"307 GB/s bandwidth: η CPU/GPU τροφοδοτείται 2x πιο γρήγορα — δεν μειώνεται απόδοση υπό παρατεταμένο φόρτο."},
  {level:"advanced",cat:"Thunderbolt",
   q:"Πελάτης με MacBook Air M5 θέλει Studio Display XDR. Τι του λες;",
   opts:["Τέλεια συμβατότητα","Το XDR θέλει Thunderbolt 5 — ο Air έχει TB4. Το Studio Display (5K) είναι η σωστή επιλογή για Air.","Χρειάζεται adapter","Κανένα πρόβλημα"],
   correct:1,
   ex:"Studio Display XDR απαιτεί TB5 (MacBook Pro). Με TB4 (Air) το Studio Display 5K είναι η σωστή επιλογή."},
  {level:"advanced",cat:"ProRes",
   q:"Τι κάνει ο M5 Max που δεν κάνει ο M5 Pro για video editing;",
   opts:["Υποστηρίζει 8K display","Έχει 2 ProRes encode engines — διπλάσια ταχύτητα export","Έχει καλύτερη κάμερα","Υποστηρίζει περισσότερη SSD"],
   correct:1,
   ex:"M5 Max: 2 ProRes encode engines αντί για 1. 1 ώρα ProRes footage: ~8 λεπτά αντί ~35."},
  {level:"advanced",cat:"Σενάρια B2B",
   q:"Αρχιτέκτονας χρειάζεται Revit. Τι προτείνεις;",
   opts:["iPad Pro M5","Δεν μπορεί να χρησιμοποιήσει Mac","MacBook Pro M5 Pro + Parallels Desktop","Mac mini M4 Pro"],
   correct:2,
   ex:"Revit δεν υπάρχει native για macOS. Parallels σε M5 Pro τρέχει Windows VM με εξαιρετική απόδοση."},
  {level:"advanced",cat:"iPad",
   q:"Τι είναι το Barrel Roll του Apple Pencil Pro;",
   opts:["Το gesture αλλαγής εργαλείου με squeeze","Αναγνωρίζει τη στροφή του Pencil — η βούρτσα αποκρίνεται σαν πραγματικό πινέλο","Hover detection 12mm πριν αγγίξει","Magnetic attachment"],
   correct:1,
   ex:"Barrel Roll: η ψηφιακή βούρτσα ακολουθεί τη στροφή του Pencil. Το πιο «φυσικό» feature για illustrators."},
  {level:"advanced",cat:"Τεχνικές",
   q:"Ποια τεχνική κάνει τη μεσαία επιλογή να φαίνεται λογική;",
   opts:["Solution selling","Τεχνική αντίθεσης — παρουσιάζεις πρώτα την ακριβότερη","Ecosystem bridge","Cost-per-day reframe"],
   correct:1,
   ex:"Τεχνική αντίθεσης: δείχνεις πρώτα το premium μοντέλο, μετά η μεσαία επιλογή φαίνεται λογική και οικονομική."},
  {level:"advanced",cat:"Ecosystem",
   q:"Ποιο Continuity feature ελέγχει Mac και iPad με το ίδιο keyboard ταυτόχρονα;",
   opts:["Sidecar","Handoff","Universal Control","AirPlay"],
   correct:2,
   ex:"Universal Control: cursor περνάει από Mac σε iPad. Drag & drop μεταξύ τους. Ένα keyboard/mouse για δύο συσκευές."},
  {level:"advanced",cat:"Σενάρια",
   q:"Video editor με fixed setup, δεν ταξιδεύει, heavy 3D. Σκέφτεται MacBook Pro 16\" M5 Max. Τι εξετάζεις;",
   opts:["Πουλάς αμέσως — αυτό ζήτησε","Mac Studio M4 Max — για fixed setup: περισσότερα ports, 4 οθόνες, καλύτερη αξία","iMac — all-in-one","MacBook Pro 14\" — πιο φορητό"],
   correct:1,
   ex:"Αν δεν ταξιδεύει, Mac Studio δίνει καλύτερη αξία για fixed setup — δεν πληρώνει premium φορητότητας."},
  {level:"advanced",cat:"iCloud",
   q:"Οικογένεια 5 ατόμων, όλοι με iPhone/iPad. Ποιο iCloud πλάνο;",
   opts:["50GB ο καθένας ξεχωριστά","iCloud+ 2TB με Family Sharing — κοινό storage για 6 άτομα","Δωρεάν 5GB — αρκεί","200GB για τον αρχηγό"],
   correct:1,

var questions = [];
var cur = 0;
var answers = [];
var timeLeft = 25 * 60;
var timerID = null;

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function startExam() {
  questions = shuffle(QUESTIONS);
  answers = [];
  cur = 0;
  timeLeft = 25 * 60;
  document.getElementById('intro').style.display = 'none';
  document.getElementById('quiz').classList.add('on');
  renderQ();
  startTimer();
}

function startTimer() {
  if (timerID) clearInterval(timerID);
  timerID = setInterval(function() {
    timeLeft--;
    updateTimer();
    if (timeLeft <= 0) {
      clearInterval(timerID);
      showResults();
    }
  }, 1000);
}

function updateTimer() {
  var m = Math.floor(timeLeft / 60);
  var s = timeLeft % 60;
  var el = document.getElementById('qTimer');
  el.textContent = m + ':' + (s < 10 ? '0' : '') + s;
  el.className = 'qbar-timer' + (timeLeft <= 60 ? ' danger' : timeLeft <= 180 ? ' warn' : '');
}

function renderQ() {
  var q = questions[cur];
  var n = questions.length;

  document.getElementById('qCounter').textContent = (cur + 1) + ' / ' + n;
  document.getElementById('qProg').style.width = Math.round((cur / n) * 100) + '%';

  var badge = document.getElementById('qBadge');
  badge.textContent = q.level.charAt(0).toUpperCase() + q.level.slice(1);
  badge.className = 'qbar-badge b-' + q.level;

  document.getElementById('qCat').textContent = q.cat;
  document.getElementById('qText').textContent = q.q;

  var optsEl = document.getElementById('qOpts');
  optsEl.innerHTML = '';
  var letters = ['Α','Β','Γ','Δ'];
  for (var i = 0; i < q.opts.length; i++) {
    var btn = document.createElement('button');
    btn.className = 'qopt';
    btn.setAttribute('data-idx', i);
    btn.innerHTML = '<span class="oletter">' + letters[i] + '</span><span>' + q.opts[i] + '</span>';
    btn.onclick = (function(idx) { return function() { selectAnswer(idx); }; })(i);
    optsEl.appendChild(btn);
  }

  var fb = document.getElementById('qFb');
  fb.className = 'qfeedback';
  fb.textContent = '';

  var nxt = document.getElementById('nextBtn');
  nxt.className = 'q-next-btn';
  nxt.textContent = (cur < n - 1) ? 'Επόμενη →' : 'Αποτελέσματα →';

  window.scrollTo(0, 0);
}

function selectAnswer(idx) {
  var q = questions[cur];
  answers[cur] = idx;
  var correct = (idx === q.correct);

  var btns = document.getElementById('qOpts').querySelectorAll('.qopt');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.add('off');
    if (parseInt(btns[i].getAttribute('data-idx')) === q.correct) {
      btns[i].classList.remove('off');
      btns[i].classList.add('correct');
    }
  }
  if (!correct) {
    btns[idx].classList.remove('off');
    btns[idx].classList.add('wrong');
  }

  var fb = document.getElementById('qFb');
  fb.className = 'qfeedback on ' + (correct ? 'c' : 'w');
  fb.textContent = (correct ? '✅ Σωστά. — ' : '❌ Λάθος. — ') + q.ex;

  document.getElementById('nextBtn').className = 'q-next-btn on';
}

function nextQ() {
  if (cur < questions.length - 1) {
    cur++;
    renderQ();
  } else {
    clearInterval(timerID);
    showResults();
  }
}

function showResults() {
  document.getElementById('quiz').classList.remove('on');
  document.getElementById('results').classList.add('on');

  var byLevel = {basic:{c:0,t:0}, advanced:{c:0,t:0}, expert:{c:0,t:0}};
  for (var i = 0; i < questions.length; i++) {
    var lv = questions[i].level;
    byLevel[lv].t++;
    if (answers[i] === questions[i].correct) byLevel[lv].c++;
  }
  var total = questions.length;
  var correct = byLevel.basic.c + byLevel.advanced.c + byLevel.expert.c;
  var pct = Math.round((correct / total) * 100);

  var emoji, title, sub;
  if (pct >= 90)      { emoji = '💎'; title = 'Εξαιρετικό!';     sub = 'Expert επίπεδο. Είσαι έτοιμος.'; }
  else if (pct >= 80) { emoji = '🏆'; title = 'Πολύ καλά!';      sub = 'Ισχυρές γνώσεις σε όλα τα επίπεδα.'; }
  else if (pct >= 70) { emoji = '⭐'; title = 'Πέρασες!';         sub = 'Επανέλαβε τις ερωτήσεις που έχασες.'; }
  else if (pct >= 50) { emoji = '📚'; title = 'Χρειάζεται δουλειά.'; sub = 'Ξαναδές τις ενότητες.'; }
  else                { emoji = '🔄'; title = 'Συνέχισε.';        sub = 'Ξεκίνα από τη βασική εκπαίδευση.'; }

  document.getElementById('rEmoji').textContent = emoji;
  document.getElementById('rTitle').textContent = title;
  document.getElementById('rSub').textContent = sub;
  document.getElementById('rPct').textContent = pct + '%';
  document.getElementById('rRaw').textContent = correct + ' σωστές από ' + total;

  setTimeout(function() {
    var levels = [{key:'basic',bar:'barBasic',sc:'scBasic'},{key:'advanced',bar:'barAdv',sc:'scAdv'},{key:'expert',bar:'barExp',sc:'scExp'}];
    for (var i = 0; i < levels.length; i++) {
      var lv = levels[i];
      var d = byLevel[lv.key];
      var p = d.t ? Math.round((d.c / d.t) * 100) : 0;
      document.getElementById(lv.bar).style.width = p + '%';
      document.getElementById(lv.sc).textContent = d.c + '/' + d.t;
    }
  }, 300);

  var list = document.getElementById('revList');
  list.innerHTML = '';
  for (var i = 0; i < questions.length; i++) {
    var q = questions[i];
    var ok = (answers[i] === q.correct);
    var div = document.createElement('div');
    div.className = 'rev-item' + (ok ? ' ok' : '');
    var yourAns = (answers[i] !== undefined) ? q.opts[answers[i]] : '—';
    div.innerHTML = '<div class="rev-q">' + (ok ? '✅' : '❌') + ' ' + q.q + '</div>'
      + '<div class="rev-ans">'
      + (ok
          ? '<span class="ca">Σωστά: ' + q.opts[q.correct] + '</span>'
          : '<span class="wa">Απάντησες: ' + yourAns + '</span> · <span class="ca">Σωστό: ' + q.opts[q.correct] + '</span>')
      + '</div>';
    list.appendChild(div);
  }

  window.scrollTo(0, 0);
}

function retryExam() {
  document.getElementById('results').classList.remove('on');
  document.getElementById('intro').style.display = 'flex';
}
</script>
